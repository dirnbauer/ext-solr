<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
	xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
	data-namespace-typo3-fluid="true"
>

<p>
	<f:translate key="solr.reports:report.solrVersion.unsupported.intro" /><br />
	<f:translate key="solr.reports:report.solrVersion.unsupported.recommendation" /><br />
	<f:translate key="solr.reports:report.solrVersion.supportedVersions" />
	<f:for each="{supportedSolrVersions}" as="version" iteration="iterator">
		<strong><code>{version}</code></strong>{f:if(condition: '{iterator.isLast}', then: '.', else: ',')}
	</f:for>
	<br /><f:translate key="solr.reports:report.solrVersion.currentVersion" /> <code>{currentVersion}</code>.
</p>
<table class="table table-sm table-hover table-striped">
	<thead>
		<tr>
			<th scope="col" colspan="2"><f:translate key="solr.reports:report.table.affectedSolrServer" /></th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<th scope="row"><f:translate key="solr.reports:report.table.host" /></th>
			<td>{solr.primaryEndpoint.host}</td>
		</tr>
		<tr>
			<th scope="row"><f:translate key="solr.reports:report.table.path" /></th>
			<td>{solr.corePath}</td>
		</tr>
		<tr>
			<th scope="row"><f:translate key="solr.reports:report.table.port" /></th>
			<td>{solr.primaryEndpoint.port}</td>
		</tr>
	</tbody>
</table>

</html>
